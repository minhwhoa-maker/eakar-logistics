<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết chuyến</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared.js"></script>
</head>
<body>
    <div class="header">
        <h2>📋 <span class="header-text">Chi tiết chuyến</span></h2>
        <div style="display:flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end;">
            <button class="btn btn-gray btn-sm" onclick="goBack()">← Quay lại</button>
            <button class="btn btn-logout" onclick="logout()">Đăng xuất</button>
        </div>
    </div>
    <div class="container">
        <div id="trip-info"></div>
        <div id="finance-summary"></div>
        <div id="expenses-section"></div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
    function showToast(msg, type = '') {
        const t = document.getElementById('toast')
        t.textContent = msg
        t.className = 'toast show ' + type
        setTimeout(() => t.className = 'toast', 3000)
    }

    const sb = createSb()
    let currentProfile = null
    let currentTrip = null
    let activeFormId = null
    let activeReceiptFile = null
    let activeReceiptIsRealtime = null

    const EXPENSE_TYPES = {
        xang:   '⛽ Xăng',
        bai_xe: '🅿️ Bãi xe',
        khac:   '📦 Khác'
    }

    // ── Navigation ────────────────────────────────────────────────────
    function goBack() {
        const ref = document.referrer
        if (ref.includes('driver-page')) {
            window.location.href = 'driver-page.html'
        } else if (ref.includes('owner-dashboard')) {
            window.location.href = 'owner-dashboard.html'
        } else if (currentProfile?.role === 'driver') {
            window.location.href = 'driver-page.html'
        } else if (currentProfile?.role === 'owner') {
            window.location.href = 'owner-dashboard.html'
        } else {
            window.location.href = 'bai10.html'
        }
    }

    async function logout() {
        await sb.auth.signOut()
        window.location.href = 'bai10.html'
    }

    // ── Form management ───────────────────────────────────────────────
    function openForm(formId) {
        if (activeFormId !== null) {
            const oldForm = document.querySelector(`[data-form-id="${activeFormId}"]`)
            if (oldForm) oldForm.style.display = 'none'
            activeReceiptFile = null
            activeReceiptIsRealtime = null
            activeFormId = null
        }
        activeFormId = formId
        const form = document.querySelector(`[data-form-id="${formId}"]`)
        if (form) form.style.display = 'block'
    }

    function closeActiveForm() {
        if (activeFormId !== null) {
            const form = document.querySelector(`[data-form-id="${activeFormId}"]`)
            if (form) form.style.display = 'none'
            activeReceiptFile = null
            activeReceiptIsRealtime = null
            activeFormId = null
        }
    }

    // ── Upload ────────────────────────────────────────────────────────
    async function uploadReceipt(file, userId) {
        const ext = (file.name.split('.').pop() || 'jpg').replace(/[^a-z0-9]/gi, '') || 'jpg'
        const path = `${userId}/${Date.now()}.${ext}`
        const { error } = await sb.storage.from('receipts').upload(path, file, { upsert: false })
        if (error) throw error
        const { data } = sb.storage.from('receipts').getPublicUrl(path)
        return data.publicUrl
    }

    // ── Money hint ────────────────────────────────────────────────────
    function numberToVietnamese(n) {
        if (n === 0) return 'không đồng'
        const UNITS = ['', 'một', 'hai', 'ba', 'bốn', 'năm', 'sáu', 'bảy', 'tám', 'chín']
        function readTens(t, u) {
            if (t === 1) return 'mười' + (u > 0 ? ' ' + (u === 5 ? 'lăm' : UNITS[u]) : '')
            return UNITS[t] + ' mươi' + (u > 0 ? ' ' + (u === 1 ? 'mốt' : u === 5 ? 'lăm' : UNITS[u]) : '')
        }
        function readThreeDigits(n) {
            if (n === 0) return ''
            const h = Math.floor(n / 100)
            const t = Math.floor((n % 100) / 10)
            const u = n % 10
            if (h > 0) {
                let r = UNITS[h] + ' trăm'
                if (t === 0 && u > 0) r += ' lẻ ' + UNITS[u]
                else if (t > 0) r += ' ' + readTens(t, u)
                return r
            }
            return t > 0 ? readTens(t, u) : UNITS[u]
        }
        const ty = Math.floor(n / 1_000_000_000)
        const trieu = Math.floor((n % 1_000_000_000) / 1_000_000)
        const nghin = Math.floor((n % 1_000_000) / 1_000)
        const remainder = n % 1_000
        const parts = []
        if (ty > 0) parts.push(readThreeDigits(ty) + ' tỷ')
        if (trieu > 0) parts.push(readThreeDigits(trieu) + ' triệu')
        if (nghin > 0) parts.push(readThreeDigits(nghin) + ' nghìn')
        if (remainder > 0) parts.push(readThreeDigits(remainder))
        const result = parts.join(' ') + ' đ'; return result.charAt(0).toUpperCase() + result.slice(1)
    }

    function addMoneyHint(input) {
        const hint = document.createElement('small')
        hint.style.cssText = 'color:var(--primary);font-size:0.85em;margin-top:4px;display:block;min-height:1.2em'
        input.type = 'text'
        input.addEventListener('input', () => {
            const pos = input.selectionStart
            const oldVal = input.value
            let digitsBefore = 0
            for (let i = 0; i < pos; i++) {
                if (/\d/.test(oldVal[i])) digitsBefore++
            }
            const raw = input.value.replace(/\D/g, '')
            input.dataset.rawValue = raw
            const formatted = raw ? raw.replace(/\B(?=(\d{3})+(?!\d))/g, '.') : ''
            input.value = formatted
            let count = 0
            let newPos = formatted.length
            for (let i = 0; i < formatted.length; i++) {
                if (/\d/.test(formatted[i])) count++
                if (count === digitsBefore) { newPos = i + 1; break }
            }
            input.setSelectionRange(newPos, newPos)
            const n = Number(raw)
            hint.textContent = (raw && Number.isFinite(n)) ? numberToVietnamese(n) : ''
        })
        input.insertAdjacentElement('afterend', hint)
        return hint
    }

    function handleFileSelect(input) {
        if (!input.files || !input.files[0]) return
        activeReceiptFile = input.files[0]
        const reader = new FileReader()
        reader.onload = e => {
            const form = document.querySelector(`[data-form-id="${activeFormId}"]`)
            if (!form) return
            const img = form.querySelector('.receipt-preview-img')
            const preview = form.querySelector('.receipt-preview')
            if (img) img.src = e.target.result
            if (preview) preview.style.display = 'block'
        }
        reader.readAsDataURL(activeReceiptFile)
    }

    function buildUploadGroup(onRemove, options = {}) {
        const group = document.createElement('div')
        group.className = 'form-group'

        const label = document.createElement('label')
        label.textContent = 'Ảnh hóa đơn'

        const cameraInput = document.createElement('input')
        cameraInput.type = 'file'
        cameraInput.accept = 'image/*'
        cameraInput.setAttribute('capture', 'environment')
        cameraInput.className = 'upload-input'
        cameraInput.onchange = e => {
            handleFileSelect(e.target)
            if (e.target.files[0] && options.onPickRealtime) options.onPickRealtime(e.target.files[0])
        }

        let galleryInput
        let btnGal

        if (options.showGallery) {
            galleryInput = document.createElement('input')
            galleryInput.type = 'file'
            galleryInput.accept = 'image/*'
            galleryInput.className = 'upload-input'
            galleryInput.onchange = e => {
                handleFileSelect(e.target)
                if (e.target.files[0] && options.onPickGallery) options.onPickGallery(e.target.files[0])
            }

            btnGal = document.createElement('button')
            btnGal.type = 'button'
            btnGal.className = 'btn-upload'
            btnGal.innerHTML = '<span class="upload-icon">🖼️</span> Thư viện'
            btnGal.onclick = () => galleryInput.click()
        }

        const uploadBtns = document.createElement('div')
        uploadBtns.className = 'upload-buttons'

        const btnCam = document.createElement('button')
        btnCam.type = 'button'
        btnCam.className = 'btn-upload'
        btnCam.innerHTML = '<span class="upload-icon">📷</span> Chụp ảnh'
        btnCam.onclick = () => cameraInput.click()

        uploadBtns.appendChild(btnCam)
        if (btnGal) uploadBtns.appendChild(btnGal)

        const preview = document.createElement('div')
        preview.className = 'receipt-preview'
        preview.style.marginTop = '12px'
        preview.style.display = 'none'

        const previewImg = document.createElement('img')
        previewImg.className = 'receipt-preview-img'
        previewImg.style.cssText = 'width:100%;max-height:200px;object-fit:cover;border-radius:var(--radius-sm);border:1.5px solid var(--border);display:block'

        const removeSpan = document.createElement('span')
        removeSpan.className = 'preview-remove'
        removeSpan.textContent = '✕ Xóa ảnh'
        removeSpan.onclick = () => {
            cameraInput.value = ''
            if (galleryInput) galleryInput.value = ''
            activeReceiptFile = null
            previewImg.src = ''
            preview.style.display = 'none'
            if (onRemove) onRemove()
        }

        preview.append(previewImg, removeSpan)
        const childrenOfGroup = [label, cameraInput]
        if (galleryInput) childrenOfGroup.push(galleryInput)
        childrenOfGroup.push(uploadBtns, preview)
        group.append(...childrenOfGroup)
        return group
    }

    // ── Render trip info ──────────────────────────────────────────────
    function renderTripInfo(trip) {
        const container = document.getElementById('trip-info')
        container.textContent = ''

        const card = document.createElement('div')
        card.className = 'card'

        const titleEl = document.createElement('div')
        titleEl.style.cssText = 'font-weight:700;font-size:1.15em;margin-bottom:8px'
        titleEl.textContent = trip.tuyen_duong || ''

        const statusEl = document.createElement('span')
        statusEl.className = 'status status-' + trip.trang_thai
        statusEl.textContent = trip.trang_thai === 'dang_chay' ? '🚛 Đang chạy' : '✅ Hoàn thành'
        statusEl.style.cssText = 'display:inline-block;margin-bottom:12px'

        function infoRow(label, value) {
            const row = document.createElement('div')
            row.style.cssText = 'display:flex;gap:8px;margin-top:6px;font-size:0.95em'
            const lEl = document.createElement('span')
            lEl.style.color = 'var(--text-muted)'
            lEl.textContent = label + ':'
            const vEl = document.createElement('span')
            vEl.textContent = value
            row.append(lEl, vEl)
            return row
        }

        card.append(titleEl, statusEl)
        card.appendChild(infoRow('Bắt đầu', formatDate(trip.ngay_bat_dau)))
        card.appendChild(infoRow('Kết thúc', trip.ngay_ket_thuc ? formatDate(trip.ngay_ket_thuc) : '—'))
        if (trip.ghi_chu) card.appendChild(infoRow('Ghi chú', trip.ghi_chu))
        if (trip.tai_xe?.full_name) card.appendChild(infoRow('Tài xế', trip.tai_xe.full_name))
        if (trip.xe?.bien_so) card.appendChild(infoRow('Biển số', formatBienSo(trip.xe.bien_so)))

        // GPS links
        function gpsLink(label, lat, lng) {
            if (!lat || !lng) return null
            const a = document.createElement('a')
            a.href = `https://www.google.com/maps?q=${lat},${lng}`
            a.target = '_blank'
            a.style.cssText = 'display:inline-block;margin-top:6px;margin-right:8px;color:var(--primary);font-size:0.9em;text-decoration:none'
            a.textContent = `📍 ${label}`
            return a
        }

        const gpsRow = document.createElement('div')
        gpsRow.style.marginTop = '10px'
        const aStart = gpsLink('Bắt đầu', trip.lat_bat_dau, trip.lng_bat_dau)
        const aEnd   = gpsLink('Kết thúc', trip.lat_ket_thuc, trip.lng_ket_thuc)
        if (aStart) gpsRow.appendChild(aStart)
        if (aEnd)   gpsRow.appendChild(aEnd)
        if (aStart || aEnd) card.appendChild(gpsRow)

        container.appendChild(card)
    }

    // ── Render financial summary ──────────────────────────────────────
    function renderFinanceSummary(trip) {
        const container = document.getElementById('finance-summary')
        container.textContent = ''
        if (trip.trang_thai !== 'hoan_thanh') return

        const doanhThu = Number(trip.doanh_thu) || 0
        const chiPhi   = Number(trip.chi_phi) || 0
        const loiNhuan = doanhThu - chiPhi

        const grid = document.createElement('div')
        grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px'

        function statCard(label, value, colorClass) {
            const sc = document.createElement('div')
            sc.className = 'stat-card'
            const h3 = document.createElement('h3')
            h3.textContent = label
            const sv = document.createElement('div')
            sv.className = 'stat-value ' + colorClass
            sv.textContent = formatMoney(value)
            sc.append(h3, sv)
            return sc
        }

        grid.append(
            statCard('Doanh thu', doanhThu, 'green'),
            statCard('Chi phí', chiPhi, 'red'),
            statCard('Lợi nhuận', loiNhuan, loiNhuan >= 0 ? 'green' : 'red'),
            statCard('Lương chuyến', Number(trip.luong_chuyen) || 0, 'orange'),
            statCard('Tạm ứng', Number(trip.tam_ung) || 0, 'blue'),
            statCard('Hoàn ứng', Number(trip.hoan_ung) || 0, 'blue')
        )
        container.appendChild(grid)
    }

    // ── Expenses ──────────────────────────────────────────────────────
    async function loadExpenses() {
        const { data, error } = await sb
            .from('chi_phi_chuyen').select('*')
            .eq('trip_id', currentTrip.id)
            .order('created_at', { ascending: true })
        if (!error) renderExpenses(data || [])
    }

    async function reloadTripChiPhi() {
        const { data } = await sb.from('trips').select('chi_phi').eq('id', currentTrip.id).single()
        if (data) currentTrip.chi_phi = data.chi_phi
    }

    function canEditExpenses() {
        return currentProfile.role === 'driver'
            && currentTrip.trang_thai === 'dang_chay'
            && currentTrip.tai_xe_id === currentProfile.id
    }

    function openImageModal(url) {
        const overlay = document.createElement('div')
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;justify-content:center;align-items:center'

        const img = document.createElement('img')
        img.src = url
        img.style.cssText = 'max-width:95vw;max-height:90vh;object-fit:contain;border-radius:8px'

        const closeBtn = document.createElement('button')
        closeBtn.textContent = '✕'
        closeBtn.style.cssText = 'position:absolute;top:16px;right:16px;font-size:1.5em;background:none;border:none;color:white;cursor:pointer'
        closeBtn.onclick = () => { overlay.remove(); document.body.classList.remove('modal-open') }

        overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); document.body.classList.remove('modal-open') } })
        overlay.append(img, closeBtn)
        document.body.appendChild(overlay)
        document.body.classList.add('modal-open')
    }

    function renderExpenses(expenses) {
        const container = document.getElementById('expenses-section')
        container.textContent = ''

        const card = document.createElement('div')
        card.className = 'card'

        const cardHeader = document.createElement('div')
        cardHeader.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:12px'
        const cardTitle = document.createElement('h3')
        cardTitle.style.margin = '0'
        cardTitle.textContent = 'Chi phí phát sinh'
        cardHeader.appendChild(cardTitle)

        if (canEditExpenses()) {
            const btnAdd = document.createElement('button')
            btnAdd.className = 'btn btn-warning btn-sm'
            btnAdd.textContent = '+ Thêm chi phí'
            btnAdd.onclick = () => openForm('add-expense')
            cardHeader.appendChild(btnAdd)
        }
        card.appendChild(cardHeader)

        if (canEditExpenses()) card.appendChild(buildAddExpenseForm())

        if (expenses.length === 0) {
            const empty = document.createElement('p')
            empty.style.color = 'var(--text-muted)'
            empty.textContent = 'Chưa có chi phí nào'
            card.appendChild(empty)
        } else {
            expenses.forEach(exp => {
                const typeLabel = EXPENSE_TYPES[exp.loai] || exp.loai || ''
                const icon = typeLabel.split(' ')[0] || ''

                const row = document.createElement('div')
                row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0;flex-wrap:wrap'

                const iconEl = document.createElement('span')
                iconEl.textContent = icon

                const descEl = document.createElement('span')
                descEl.style.flex = '1'
                descEl.textContent = exp.mo_ta || typeLabel.replace(/^\S+\s?/, '')

                const amountEl = document.createElement('span')
                amountEl.style.cssText = 'color:var(--danger);font-weight:600'
                let nguonIcon = ''
                if (exp.nguon_tien === 'driver_paid') nguonIcon = '👤'
                else if (exp.nguon_tien === 'owner_paid') nguonIcon = '🏢'
                amountEl.textContent = (nguonIcon ? nguonIcon + ' ' : '') + formatMoney(exp.so_tien)
                amountEl.title = exp.nguon_tien === 'driver_paid' ? 'Tài xế tự chi (móc tạm ứng)' :
                                 exp.nguon_tien === 'owner_paid' ? 'Chủ chuyển khoản trực tiếp' : ''

                const actions = document.createElement('div')
                actions.style.cssText = 'display:flex;gap:4px;align-items:center'

                if (exp.anh_url) {
                    const photoBtn = document.createElement('button')
                    photoBtn.textContent = exp.anh_realtime === false ? '📷⚠️' : '📷'
                    photoBtn.title = exp.anh_realtime === false ? 'Ảnh upload từ thư viện (không chụp realtime)' : 'Ảnh chụp realtime'
                    photoBtn.className = 'btn btn-sm btn-gray'
                    photoBtn.onclick = () => openImageModal(exp.anh_url)
                    actions.appendChild(photoBtn)
                }

                if (exp.lat && exp.lng) {
                    const gpsBtn = document.createElement('a')
                    gpsBtn.href = `https://www.google.com/maps?q=${exp.lat},${exp.lng}`
                    gpsBtn.target = '_blank'
                    gpsBtn.textContent = '📍'
                    gpsBtn.style.textDecoration = 'none'
                    actions.appendChild(gpsBtn)
                }

                if (canEditExpenses()) {
                    const editBtn = document.createElement('button')
                    editBtn.className = 'btn btn-sm btn-gray'
                    editBtn.textContent = '✏️'
                    editBtn.onclick = () => openForm('edit-' + exp.id)

                    const delBtn = document.createElement('button')
                    delBtn.className = 'btn btn-sm btn-danger'
                    delBtn.textContent = '🗑️'
                    delBtn.onclick = () => deleteExpense(exp.id)

                    actions.append(editBtn, delBtn)
                }

                const items = [iconEl]
                if (exp.is_legacy) {
                    const legacyBadge = document.createElement('span')
                    legacyBadge.textContent = '⚠️ Cũ'
                    legacyBadge.title = 'Entry trước hệ thống bằng chứng — không có ảnh/GPS realtime'
                    legacyBadge.style.cssText = 'background:#fff3cd;color:#856404;padding:2px 6px;border-radius:4px;font-size:0.75em;font-weight:600'
                    items.push(legacyBadge)
                }
                items.push(descEl, amountEl, actions)
                row.append(...items)
                card.appendChild(row)
                if (canEditExpenses()) card.appendChild(buildEditExpenseForm(exp))
            })
        }

        container.appendChild(card)
    }

    // ── Add expense form ──────────────────────────────────────────────
    function buildAddExpenseForm() {
        const wrap = document.createElement('div')
        wrap.setAttribute('data-form-id', 'add-expense')
        wrap.style.cssText = 'display:none;border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px'

        const h4 = document.createElement('h4')
        h4.style.cssText = 'margin-bottom:10px;color:var(--primary)'
        h4.textContent = 'Thêm chi phí'

        const loaiGroup = document.createElement('div')
        loaiGroup.className = 'form-group'
        const loaiLabel = document.createElement('label')
        loaiLabel.textContent = 'Loại'
        const loaiSelect = document.createElement('select')
        loaiSelect.setAttribute('data-field', 'loai')
        loaiSelect.style.cssText = 'width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;color:#1a1a2e;background:white'
        Object.entries(EXPENSE_TYPES).forEach(([val, text]) => {
            const opt = document.createElement('option')
            opt.value = val; opt.textContent = text
            loaiSelect.appendChild(opt)
        })
        loaiGroup.append(loaiLabel, loaiSelect)

        const nguonGroup = document.createElement('div')
        nguonGroup.className = 'form-group'
        const nguonLabel = document.createElement('label')
        nguonLabel.textContent = 'Nguồn tiền'
        const nguonSelect = document.createElement('select')
        nguonSelect.setAttribute('data-field', 'nguon_tien')
        nguonSelect.style.cssText = 'width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;color:#1a1a2e;background:white'
        const nPh = document.createElement('option')
        nPh.value = ''; nPh.textContent = '-- Chọn nguồn tiền --'
        const nDr = document.createElement('option')
        nDr.value = 'driver_paid'; nDr.textContent = '👤 Tài xế tự chi'
        const nOw = document.createElement('option')
        nOw.value = 'owner_paid'; nOw.textContent = '🏢 Chủ chuyển khoản'
        nguonSelect.append(nPh, nDr, nOw)
        nguonGroup.append(nguonLabel, nguonSelect)

        const soTienGroup = document.createElement('div')
        soTienGroup.className = 'form-group'
        const soTienLabel = document.createElement('label')
        soTienLabel.textContent = 'Số tiền (đ)'
        const soTienInput = document.createElement('input')
        soTienInput.type = 'number'
        soTienInput.setAttribute('data-field', 'so_tien')
        soTienGroup.append(soTienLabel, soTienInput)
        addMoneyHint(soTienInput)

        const moTaGroup = document.createElement('div')
        moTaGroup.className = 'form-group'
        const moTaLabel = document.createElement('label')
        moTaLabel.textContent = 'Mô tả'
        const moTaInput = document.createElement('input')
        moTaInput.type = 'text'
        moTaInput.setAttribute('data-field', 'mo_ta')
        moTaGroup.append(moTaLabel, moTaInput)

        const uploadGroup = buildUploadGroup(
            () => { activeReceiptIsRealtime = null },
            {
                showGallery: false,
                onPickRealtime: () => { activeReceiptIsRealtime = true }
            }
        )

        const btnRow = document.createElement('div')
        btnRow.style.cssText = 'display:flex;gap:8px;margin-top:4px'
        const btnSave = document.createElement('button')
        btnSave.className = 'btn'
        btnSave.textContent = 'Lưu chi phí'
        btnSave.onclick = submitAddExpense
        const btnCancel = document.createElement('button')
        btnCancel.className = 'btn btn-gray'
        btnCancel.textContent = 'Hủy'
        btnCancel.onclick = closeActiveForm
        btnRow.append(btnSave, btnCancel)

        wrap.append(h4, loaiGroup, nguonGroup, soTienGroup, moTaGroup, uploadGroup, btnRow)
        return wrap
    }

    async function submitAddExpense() {
        const form = document.querySelector('[data-form-id="add-expense"]')
        const loai = form.querySelector('[data-field="loai"]').value
        const soTienEl = form.querySelector('[data-field="so_tien"]')
        const soTienVal = soTienEl.dataset.rawValue || soTienEl.value
        const mo_ta = form.querySelector('[data-field="mo_ta"]').value.trim()
        const so_tien = Number(soTienVal)
        if (!soTienVal || !Number.isFinite(so_tien) || so_tien < 0) {
            showToast('Vui lòng nhập số tiền hợp lệ', 'error'); return
        }
        const nguon_tien = form.querySelector('[data-field="nguon_tien"]').value
        if (!nguon_tien) {
            showToast('Vui lòng chọn nguồn tiền', 'error'); return
        }
        if (!activeReceiptFile) {
            showToast('Vui lòng chụp ảnh hóa đơn/bằng chứng', 'error'); return
        }
        const btnSave = form.querySelector('.btn')
        btnSave.disabled = true
        showToast('Đang lấy vị trí GPS...')
        let loc
        try {
            loc = await getLocation()
        } catch (e) {
            showToast(e.message, 'error')
            btnSave.disabled = false
            return
        }
        let anh_url = null
        if (activeReceiptFile) {
            try {
                showToast('Đang upload ảnh...')
                anh_url = await uploadReceipt(activeReceiptFile, currentProfile.id)
            } catch (e) {
                showToast('Lỗi upload ảnh: ' + e.message, 'error')
                btnSave.disabled = false
                return
            }
        }
        const { error } = await sb.from('chi_phi_chuyen').insert({
            trip_id: currentTrip.id, loai, mo_ta: mo_ta || null, so_tien, anh_url,
            lat: loc.lat, lng: loc.lng,
            anh_realtime: activeReceiptIsRealtime,
            is_legacy: false,
            nguon_tien
        })
        if (error) {
            showToast('Lỗi: ' + error.message, 'error')
            btnSave.disabled = false
            return
        }
        form.querySelector('[data-field="so_tien"]').value = ''
        form.querySelector('[data-field="mo_ta"]').value = ''
        btnSave.disabled = false
        closeActiveForm()
        showToast('Đã thêm chi phí', 'success')
        await reloadTripChiPhi()
        await loadExpenses()
    }

    // ── Edit expense form ─────────────────────────────────────────────
    function buildEditExpenseForm(exp) {
        const wrap = document.createElement('div')
        wrap.setAttribute('data-form-id', 'edit-' + exp.id)
        wrap.dataset.photoRemoved = 'false'
        wrap.style.cssText = 'display:none;background:var(--bg);padding:12px;border-radius:var(--radius-sm);margin:4px 0'

        const loaiGroup = document.createElement('div')
        loaiGroup.className = 'form-group'
        const loaiLabel = document.createElement('label')
        loaiLabel.textContent = 'Loại'
        const loaiSelect = document.createElement('select')
        loaiSelect.setAttribute('data-field', 'loai')
        loaiSelect.style.cssText = 'width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;color:#1a1a2e;background:white'
        Object.entries(EXPENSE_TYPES).forEach(([val, text]) => {
            const opt = document.createElement('option')
            opt.value = val; opt.textContent = text
            if (val === exp.loai) opt.selected = true
            loaiSelect.appendChild(opt)
        })
        loaiGroup.append(loaiLabel, loaiSelect)

        const nguonEditGroup = document.createElement('div')
        nguonEditGroup.className = 'form-group'
        const nguonEditLabel = document.createElement('label')
        nguonEditLabel.textContent = 'Nguồn tiền'
        const nguonEditSelect = document.createElement('select')
        nguonEditSelect.setAttribute('data-field', 'nguon_tien')
        nguonEditSelect.style.cssText = 'width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;color:#1a1a2e;background:white'
        const ePh = document.createElement('option')
        ePh.value = ''; ePh.textContent = '-- Chọn nguồn tiền --'
        const eDr = document.createElement('option')
        eDr.value = 'driver_paid'; eDr.textContent = '👤 Tài xế tự chi'
        const eOw = document.createElement('option')
        eOw.value = 'owner_paid'; eOw.textContent = '🏢 Chủ chuyển khoản'
        nguonEditSelect.append(ePh, eDr, eOw)
        if (exp.nguon_tien) nguonEditSelect.value = exp.nguon_tien
        nguonEditGroup.append(nguonEditLabel, nguonEditSelect)

        const soTienGroup = document.createElement('div')
        soTienGroup.className = 'form-group'
        const soTienLabel = document.createElement('label')
        soTienLabel.textContent = 'Số tiền (đ)'
        const soTienInput = document.createElement('input')
        soTienInput.type = 'number'
        soTienInput.value = exp.so_tien || ''
        soTienInput.setAttribute('data-field', 'so_tien')
        soTienGroup.append(soTienLabel, soTienInput)
        const soTienHint = addMoneyHint(soTienInput)
        if (exp.so_tien) {
            soTienInput.dataset.rawValue = String(exp.so_tien)
            soTienInput.value = Number(exp.so_tien).toLocaleString('vi-VN')
            soTienHint.textContent = numberToVietnamese(Number(exp.so_tien))
        }

        const moTaGroup = document.createElement('div')
        moTaGroup.className = 'form-group'
        const moTaLabel = document.createElement('label')
        moTaLabel.textContent = 'Mô tả'
        const moTaInput = document.createElement('input')
        moTaInput.type = 'text'
        moTaInput.value = exp.mo_ta || ''
        moTaInput.setAttribute('data-field', 'mo_ta')
        moTaGroup.append(moTaLabel, moTaInput)

        const uploadGroup = buildUploadGroup(
            () => {
                wrap.dataset.photoRemoved = 'true'
                activeReceiptIsRealtime = null
            },
            {
                showGallery: false,
                onPickRealtime: () => { activeReceiptIsRealtime = true }
            }
        )
        if (exp.anh_url) {
            const preview = uploadGroup.querySelector('.receipt-preview')
            const img = uploadGroup.querySelector('.receipt-preview-img')
            if (preview && img) { img.src = exp.anh_url; preview.style.display = 'block' }
        }

        const btnRow = document.createElement('div')
        btnRow.style.cssText = 'display:flex;gap:8px;margin-top:4px'
        const btnSave = document.createElement('button')
        btnSave.className = 'btn'
        btnSave.textContent = 'Lưu'
        btnSave.onclick = () => submitEditExpense(exp.id, exp.anh_url)
        const btnCancel = document.createElement('button')
        btnCancel.className = 'btn btn-gray'
        btnCancel.textContent = 'Hủy'
        btnCancel.onclick = closeActiveForm
        btnRow.append(btnSave, btnCancel)

        wrap.append(loaiGroup, nguonEditGroup, soTienGroup, moTaGroup, uploadGroup, btnRow)
        return wrap
    }

    async function submitEditExpense(expenseId, currentAnhUrl) {
        const form = document.querySelector(`[data-form-id="edit-${expenseId}"]`)
        const loai = form.querySelector('[data-field="loai"]').value
        const soTienEl = form.querySelector('[data-field="so_tien"]')
        const soTienVal = soTienEl.dataset.rawValue || soTienEl.value
        const mo_ta = form.querySelector('[data-field="mo_ta"]').value.trim()
        const so_tien = Number(soTienVal)
        if (!soTienVal || !Number.isFinite(so_tien) || so_tien < 0) {
            showToast('Vui lòng nhập số tiền hợp lệ', 'error'); return
        }
        let anh_url = currentAnhUrl
        if (activeReceiptFile) {
            try {
                showToast('Đang upload ảnh...')
                anh_url = await uploadReceipt(activeReceiptFile, currentProfile.id)
            } catch (e) { showToast('Lỗi upload ảnh: ' + e.message, 'error'); return }
        } else if (form.dataset.photoRemoved === 'true') {
            anh_url = null
        }
        const updatePayload = { loai, mo_ta: mo_ta || null, so_tien, anh_url }
        if (activeReceiptFile) {
            updatePayload.anh_realtime = true
        } else if (form.dataset.photoRemoved === 'true') {
            updatePayload.anh_realtime = null
        }
        const nguon_tien_val = form.querySelector('[data-field="nguon_tien"]').value
        updatePayload.nguon_tien = nguon_tien_val || null
        const { error } = await sb.from('chi_phi_chuyen')
            .update(updatePayload)
            .eq('id', expenseId)
        if (error) { showToast('Lỗi: ' + error.message, 'error'); return }
        closeActiveForm()
        showToast('Đã cập nhật chi phí', 'success')
        await reloadTripChiPhi()
        await loadExpenses()
    }

    async function deleteExpense(expenseId) {
        if (!confirm('Xóa chi phí này?')) return
        const { error } = await sb.from('chi_phi_chuyen').delete().eq('id', expenseId)
        if (error) { showToast('Lỗi: ' + error.message, 'error'); return }
        showToast('Đã xóa chi phí', 'success')
        await reloadTripChiPhi()
        await loadExpenses()
    }

    // ── Init ──────────────────────────────────────────────────────────
    async function initPage() {
        const params = new URLSearchParams(window.location.search)
        const tripId = params.get('trip_id')
        if (!tripId) { window.location.href = 'bai10.html'; return }

        const auth = await requireRole(sb, ['owner', 'driver', 'supervisor'])
        if (!auth) return
        const profile = auth.profile
        currentProfile = profile

        let ownerId
        if (currentProfile.role === 'owner') {
            ownerId = currentProfile.id
        } else {
            ownerId = currentProfile.owner_id || null
        }
        if (ownerId === null) {
            showToast('Không tìm thấy thông tin chủ xe', 'error')
            setTimeout(() => {
                window.location.href = profile.role === 'driver' ? 'driver-page.html' : 'owner-dashboard.html'
            }, 1500)
            return
        }

        const { data: trip, error } = await sb.from('trips').select('*, tai_xe:users!tai_xe_id(full_name), xe:xe(bien_so)').eq('owner_id', ownerId).eq('id', tripId).single()
        if (error || !trip) {
            showToast('Không tìm thấy chuyến', 'error')
            setTimeout(() => {
                window.location.href = profile.role === 'driver' ? 'driver-page.html' : 'owner-dashboard.html'
            }, 1500)
            return
        }
        if (profile.role === 'driver' && trip.tai_xe_id !== profile.id) {
            window.location.href = 'driver-page.html'
            return
        }
        currentTrip = trip

        renderTripInfo(trip)
        renderFinanceSummary(trip)
        await loadExpenses()
    }

    setupLogoutListener(sb)
    initPage()
    </script>
