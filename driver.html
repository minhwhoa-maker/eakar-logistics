<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý tài xế</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="shared.js"></script>
</head>
<body>
    <div class="header">
        <div style="display:flex; align-items:center; gap:8px;">
            <button class="hamburger-btn" id="hamburger-btn">☰</button>
            <div class="header-nav-desktop" style="display:flex; gap:8px;">
                <button class="btn" onclick="window.location.href='owner-dashboard.html'">← Trang chủ</button>
            </div>
        </div>
        <h2 style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);">👥 <span class="header-text">Tài xế</span></h2>
        <div style="display:flex; align-items:center; gap:8px;">
            <div class="header-nav-desktop" style="display:flex; gap:8px;">
                <button class="btn btn-success" onclick="exportExcel()">📊 Excel</button>
            </div>
            <button id="btn-notify" class="btn" onclick="toggleNotifyPanel()">🔔</button>
            <div class="header-nav-desktop" style="display:flex; gap:8px;">

    </div>
    <div class="hamburger-menu" id="hamburger-menu">
        <a href="owner-dashboard.html">← Trang chủ</a>
        <a href="vehicles.html">🚛 Xe</a>
        <a href="luong-thang.html">💰 Bảng lương</a>
        <div class="menu-divider"></div>
        <button id="menu-excel">📊 Xuất Excel</button>
        <div class="menu-divider"></div>
        <button class="menu-logout" id="menu-logout">🚪 Đăng xuất</button>
    </div>
    <div id="notify-panel" style="display:none;position:fixed;top:64px;right:16px;z-index:500;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;min-width:260px;">
        <h4 style="margin:0 0 12px;font-size:0.95em">🔔 Cài đặt thông báo</h4>
        <div class="notify-row">
            <span>🚛 Chuyến mới bắt đầu</span>
            <label class="toggle">
                <input type="checkbox" id="notif-new-trip" onchange="saveNotifySetting('notify_new_trip', this.checked)">
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="notify-row">
            <span>✅ Chuyến hoàn thành</span>
            <label class="toggle">
                <input type="checkbox" id="notif-complete" onchange="saveNotifySetting('notify_complete', this.checked)">
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="notify-row">
            <span>💰 Chi phí mới</span>
            <label class="toggle">
                <input type="checkbox" id="notif-expense" onchange="saveNotifySetting('notify_expense', this.checked)">
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="notify-row">
            <span>🔧 Báo bảo dưỡng</span>
            <label class="toggle">
                <input type="checkbox" id="notif-maintenance" onchange="saveNotifySetting('notify_maintenance', this.checked)">
                <span class="toggle-slider"></span>
            </label>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <h3>Thêm tài xế mới</h3>
            <div class="form-row">
                <input type="text" id="new-name" placeholder="Họ và tên">
                <input type="email" id="new-email" placeholder="Email đăng nhập">
                <input type="text" id="new-sdt" placeholder="Số điện thoại">
                <button class="btn" onclick="addDriver()">Thêm</button>
            </div>
            <p id="add-msg" style="display:none; color:#27ae60; font-weight:bold"></p>
        </div>
        <div class="card">
            <h3>Danh sách tài xế</h3>
            <div class="table-scroll wide">
                <table>
                    <thead>
                        <tr>
                            <th>Họ và tên</th>
                            <th>SĐT</th>
                            <th>Xe đang chạy</th>
                            <th>Đang giữ</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="driver-list">
                        <tr><td colspan="5">Đang tải ...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        function showToast(msg, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.className = 'toast', 3000);
        }
        const sb = createSb()
        let ownerProfileId = null

        async function calcDriverBalance(sb, ownerId, driverId) {
            const { data: trips } = await sb.from('trips')
                .select('id, tam_ung, hoan_ung')
                .eq('owner_id', ownerId)
                .eq('tai_xe_id', driverId)
                .eq('trang_thai', 'hoan_thanh')
            const tam_ung_trips = (trips || []).reduce((s, t) => s + (Number(t.tam_ung) || 0), 0)
            const hoan_ung_trips = (trips || []).reduce((s, t) => s + (Number(t.hoan_ung) || 0), 0)

            const { data: advances } = await sb.from('tam_ung_thang')
                .select('so_tien')
                .eq('owner_id', ownerId)
                .eq('tai_xe_id', driverId)
            const tam_ung_thang_total = (advances || []).reduce((s, a) => s + (Number(a.so_tien) || 0), 0)

            const tripIds = (trips || []).map(t => t.id)
            const { data: activeTrips } = await sb.from('trips')
                .select('id')
                .eq('owner_id', ownerId)
                .eq('tai_xe_id', driverId)
                .eq('trang_thai', 'dang_chay')
            const allTripIds = [...tripIds, ...(activeTrips || []).map(t => t.id)]

            let chi_phi_driver_paid = 0
            if (allTripIds.length > 0) {
                const { data: expenses } = await sb.from('chi_phi_chuyen')
                    .select('so_tien')
                    .in('trip_id', allTripIds)
                    .eq('nguon_tien', 'driver_paid')
                    .eq('is_legacy', false)
                chi_phi_driver_paid = (expenses || []).reduce((s, e) => s + (Number(e.so_tien) || 0), 0)
            }

            const balance = tam_ung_trips + tam_ung_thang_total - hoan_ung_trips - chi_phi_driver_paid
            return { balance, breakdown: { tam_ung_trips, hoan_ung_trips, tam_ung_thang: tam_ung_thang_total, chi_phi_driver_paid } }
        }

        function addCell(row, text) {
            const cell = document.createElement('td')
            cell.textContent = text
            row.appendChild(cell)
            return cell
        }

        function setDriverMessage(message) {
            const tbody = document.getElementById('driver-list')
            tbody.textContent = ''
            const row = document.createElement('tr')
            const cell = document.createElement('td')
            cell.colSpan = 5
            cell.textContent = message
            row.appendChild(cell)
            tbody.appendChild(row)
        }

        async function addDriver() {
            const full_name = document.getElementById('new-name').value.trim()
            const email = document.getElementById('new-email').value.trim().toLowerCase()
            const sdt = document.getElementById('new-sdt').value.trim()
            if (!full_name || !email || !sdt) {
                showToast('Vui lòng điền đủ thông tin', 'error')
                return
            }

            const { data: emailExists, error: emailError } = await sb.from('users').select('id').eq('email', email).maybeSingle()
            if (emailError) { showToast('Lỗi kiểm tra email: ' + emailError.message, 'error'); return }
            if (emailExists) { showToast('Email đã tồn tại', 'error'); return }

            const { data: sdtExists, error: sdtError } = await sb.from('users').select('id').eq('sdt', sdt).maybeSingle()
            if (sdtError) { showToast('Lỗi kiểm tra SĐT: ' + sdtError.message, 'error'); return }
            if (sdtExists) { showToast('Số điện thoại đã tồn tại', 'error'); return }

            const { error } = await sb.from('users').insert({
                full_name,
                email,
                sdt,
                role: 'driver',
                owner_id: ownerProfileId
            })

            if (error) {
                showToast('Lỗi: ' + error.message, 'error')
            } else {
                document.getElementById('add-msg').style.display = 'block'
                document.getElementById('add-msg').textContent = 'Thêm tài xế thành công!'
                document.getElementById('new-name').value = ''
                document.getElementById('new-email').value = ''
                document.getElementById('new-sdt').value = ''
                setTimeout(() => {
                    document.getElementById('add-msg').style.display = 'none'
                    loadDrivers()
                }, 1200)
            }
        }

        async function deleteDriver(id, name) {
            if (!confirm('Xóa tài xế ' + name + '?')) return false
            const { error } = await sb.from('users').delete().eq('id', id)
            if (error) { showToast('Lỗi: ' + error.message, 'error'); return false }
            loadDrivers()
            return true
        }

        async function loadDrivers() {
            try {
                const { data: drivers, error: driversError } = await sb
                    .from('users')
                    .select('*')
                    .eq('role', 'driver')
                    .eq('owner_id', ownerProfileId)

                if (driversError) throw new Error(driversError.message)

                if (!drivers || drivers.length === 0) {
                    setDriverMessage('Chưa có tài xế nào')
                    return
                }

                const { data: xeList, error: xeError } = await sb
                    .from('xe')
                    .select('tai_xe_id, bien_so')
                    .eq('owner_id', ownerProfileId)
                    .not('tai_xe_id', 'is', null)
                if (xeError) throw new Error(xeError.message)

                const xeMap = {}
                ;(xeList || []).forEach(x => { xeMap[x.tai_xe_id] = x.bien_so })

                const balanceResults = await Promise.all(
                    drivers.map(d => calcDriverBalance(sb, ownerProfileId, d.id))
                )

                const tbody = document.getElementById('driver-list')
                tbody.textContent = ''
                drivers.forEach((d, idx) => {
                    const { balance } = balanceResults[idx]

                    const row = document.createElement('tr')

                    const nameCell = document.createElement('td')
                    const nameSpan = document.createElement('span')
                    nameSpan.textContent = d.full_name || '-'
                    nameSpan.style.color = 'var(--primary)'
                    nameSpan.style.textDecoration = 'underline'
                    nameSpan.style.cursor = 'pointer'
                    nameSpan.addEventListener('click', () => openTripsModal(d.id, d.full_name || '-', d.email, d.sdt, xeMap[d.id]))
                    nameCell.appendChild(nameSpan)
                    row.appendChild(nameCell)

                    addCell(row, d.sdt || '-')
                    addCell(row, xeMap[d.id] ? formatBienSo(xeMap[d.id]) : '-')

                    const balanceCell = document.createElement('td')
                    const balanceSpan = document.createElement('span')
                    balanceSpan.textContent = formatMoney(balance)
                    balanceSpan.style.color = balance > 0 ? 'var(--danger)' : 'var(--success)'
                    balanceSpan.style.fontWeight = 'bold'
                    balanceSpan.style.cursor = 'pointer'
                    balanceSpan.style.textDecoration = 'underline'
                    balanceSpan.addEventListener('click', () => openBalanceModal(d.id, d.full_name || '-'))
                    balanceCell.appendChild(balanceSpan)
                    row.appendChild(balanceCell)

                    const actionCell = document.createElement('td')
                    const actions = document.createElement('div')
                    actions.style.display = 'flex'
                    actions.style.gap = '6px'
                    actions.style.flexWrap = 'wrap'

                    const advanceButton = document.createElement('button')
                    advanceButton.className = 'btn btn-success btn-sm'
                    advanceButton.textContent = '+ Tạm ứng'
                    advanceButton.addEventListener('click', () => openAdvanceModal(d.id, d.full_name || 'tài xế'))

                    const luongButton = document.createElement('button')
                    luongButton.className = 'btn btn-sm'
                    luongButton.textContent = '💰 Xem lương'
                    luongButton.addEventListener('click', () => window.location.href = 'luong-thang.html')

                    actions.append(advanceButton, luongButton)
                    actionCell.appendChild(actions)
                    row.appendChild(actionCell)
                    tbody.appendChild(row)
                })
            } catch (err) {
                console.error('Load drivers error:', err)
                setDriverMessage('Không thể tải dữ liệu tài xế')
                showToast('Lỗi: ' + err.message, 'error')
            }
        }

        function numberToVietnamese(n) {
            if (!n || n === 0) return ''
            const ones = ['', 'một', 'hai', 'ba', 'bốn', 'năm', 'sáu', 'bảy', 'tám', 'chín']
            function readGroup(n) {
                const h = Math.floor(n / 100)
                const t = Math.floor((n % 100) / 10)
                const o = n % 10
                let s = ''
                if (h) s += ones[h] + ' trăm'
                if (t === 1) s += (s ? ' mười' : 'mười') + (o ? ' ' + (o === 5 ? 'lăm' : o === 1 ? 'một' : ones[o]) : '')
                else if (t > 1) s += (s ? ' ' : '') + ones[t] + ' mươi' + (o ? ' ' + (o === 5 ? 'lăm' : o === 1 ? 'mốt' : ones[o]) : '')
                else if (o) s += (h ? ' lẻ ' : '') + ones[o]
                return s
            }
            const b = Math.floor(n / 1000000000)
            const m = Math.floor((n % 1000000000) / 1000000)
            const k = Math.floor((n % 1000000) / 1000)
            const r = n % 1000
            const parts = []
            if (b) parts.push(readGroup(b) + ' tỷ')
            if (m) parts.push(readGroup(m) + ' triệu')
            if (k) parts.push(readGroup(k) + ' nghìn')
            if (r) parts.push(readGroup(r))
            const s = parts.join(' ')
            return s.charAt(0).toUpperCase() + s.slice(1) + ' đ'
        }

        let advanceAmountListenerAdded = false

        function openAdvanceModal(driverId, driverName) {
            document.getElementById('advance-driver-id').value = driverId
            document.getElementById('advance-driver-name').value = driverName
            document.getElementById('advance-modal-title').textContent = 'Tạm ứng cho ' + driverName
            const amountInput = document.getElementById('advance-amount')
            amountInput.value = ''
            amountInput.dataset.rawValue = ''
            document.getElementById('advance-amount-hint').textContent = ''
            document.getElementById('advance-ghi-chu').value = ''
            if (!advanceAmountListenerAdded) {
                advanceAmountListenerAdded = true
                amountInput.addEventListener('input', function () {
                    const raw = this.value.replace(/\./g, '').replace(/\D/g, '')
                    this.dataset.rawValue = raw
                    this.value = raw ? Number(raw).toLocaleString('vi-VN') : ''
                    document.getElementById('advance-amount-hint').textContent = raw ? numberToVietnamese(Number(raw)) : ''
                })
            }
            document.getElementById('advance-modal').style.display = 'flex'
            document.body.classList.add('modal-open')
            amountInput.focus()
        }

        function closeAdvanceModal() {
            document.getElementById('advance-modal').style.display = 'none'
            document.body.classList.remove('modal-open')
        }

        async function saveAdvance() {
            const driverId = document.getElementById('advance-driver-id').value
            const amountInput = document.getElementById('advance-amount')
            const raw = amountInput.dataset.rawValue || amountInput.value.replace(/\./g, '').replace(/\D/g, '')
            const amount = Number(raw)
            if (!raw || !Number.isFinite(amount) || amount < 0) {
                showToast('Số tiền không hợp lệ', 'error')
                return
            }
            const ghiChu = document.getElementById('advance-ghi-chu').value.trim()
            const { error } = await sb.from('tam_ung_thang').insert({
                owner_id: ownerProfileId,
                tai_xe_id: driverId,
                thang: new Date().toISOString().slice(0, 7),
                so_tien: amount,
                ghi_chu: ghiChu,
                trang_thai: 'confirmed'
            })
            if (error) { showToast('Lỗi: ' + error.message, 'error'); return }
            closeAdvanceModal()
            showToast('Đã thêm tạm ứng', 'success')
            loadDrivers()
        }

        async function openBalanceModal(driverId, driverName) {
            document.getElementById('balance-modal-title').textContent = 'Lịch sử công nợ — ' + driverName
            const body = document.getElementById('balance-modal-body')
            body.textContent = 'Đang tải...'
            document.getElementById('balance-modal').style.display = 'flex'
            document.body.classList.add('modal-open')

            const { data: allDriverTrips } = await sb.from('trips')
                .select('id, tuyen_duong')
                .eq('owner_id', ownerProfileId)
                .eq('tai_xe_id', driverId)
            const tripMap = {}
            ;(allDriverTrips || []).forEach(t => { tripMap[t.id] = t.tuyen_duong })
            const allTripIds = (allDriverTrips || []).map(t => t.id)

            const [tripsRes, advancesRes, expensesRes] = await Promise.all([
                sb.from('trips')
                    .select('id, ngay_ket_thuc, tuyen_duong, tam_ung, hoan_ung')
                    .eq('owner_id', ownerProfileId)
                    .eq('tai_xe_id', driverId)
                    .eq('trang_thai', 'hoan_thanh')
                    .or('tam_ung.gt.0,hoan_ung.gt.0'),
                sb.from('tam_ung_thang')
                    .select('id, thang, so_tien, ghi_chu')
                    .eq('owner_id', ownerProfileId)
                    .eq('tai_xe_id', driverId),
                allTripIds.length > 0
                    ? sb.from('chi_phi_chuyen')
                        .select('id, trip_id, loai, mo_ta, so_tien, created_at')
                        .in('trip_id', allTripIds)
                        .eq('nguon_tien', 'driver_paid')
                        .eq('is_legacy', false)
                    : Promise.resolve({ data: [] })
            ])

            if (tripsRes.error) { body.textContent = 'Lỗi: ' + tripsRes.error.message; return }
            if (advancesRes.error) { body.textContent = 'Lỗi: ' + advancesRes.error.message; return }

            const entries = []
            ;(tripsRes.data || []).forEach(t => {
                if (Number(t.tam_ung) > 0) {
                    entries.push({ date: t.ngay_ket_thuc, type: 'trip_advance', label: 'Tạm ứng chuyến: ' + (t.tuyen_duong || '-'), amount: Number(t.tam_ung), sign: +1 })
                }
                if (Number(t.hoan_ung) > 0) {
                    entries.push({ date: t.ngay_ket_thuc, type: 'refund', label: 'Hoàn ứng chuyến: ' + (t.tuyen_duong || '-'), amount: Number(t.hoan_ung), sign: -1 })
                }
            })
            ;(advancesRes.data || []).forEach(a => {
                entries.push({ date: a.thang + '-01', type: 'advance', label: 'Tạm ứng' + (a.ghi_chu ? ': ' + a.ghi_chu : ''), amount: Number(a.so_tien), sign: +1 })
            })
            ;(expensesRes.data || []).forEach(e => {
                const loaiLabel = ({ xang: '⛽ Xăng', bai_xe: '🅿️ Bãi xe', khac: '📦 Khác' })[e.loai] || e.loai
                const tuyen = tripMap[e.trip_id] || ''
                const routeLabel = tuyen ? ' (' + tuyen + ')' : ''
                const descLabel = e.mo_ta ? e.mo_ta : loaiLabel
                entries.push({ date: e.created_at, type: 'expense_driver', label: 'Chi: ' + descLabel + routeLabel, amount: Number(e.so_tien), sign: -1 })
            })
            entries.sort((a, b) => new Date(a.date) - new Date(b.date))

            body.textContent = ''

            if (entries.length === 0) {
                const empty = document.createElement('p')
                empty.textContent = 'Chưa có giao dịch nào'
                empty.style.cssText = 'text-align:center;color:var(--text-muted);padding:16px'
                body.appendChild(empty)
                return
            }

            const badgeStyle = {
                trip_advance:   'background:#e0e0e0;color:#555;padding:2px 8px;border-radius:12px;font-size:12px;white-space:nowrap',
                refund:         'background:#e8f5e9;color:#27ae60;padding:2px 8px;border-radius:12px;font-size:12px;white-space:nowrap',
                advance:        'background:#fff3e0;color:#e67e22;padding:2px 8px;border-radius:12px;font-size:12px;white-space:nowrap',
                expense_driver: 'background:#ffebee;color:#c62828;padding:2px 8px;border-radius:12px;font-size:12px;white-space:nowrap'
            }
            const badgeLabel = { trip_advance: 'Tạm ứng chuyến', refund: 'Hoàn ứng', advance: 'Tạm ứng ngoài', expense_driver: 'Chi phí tự chi' }

            const table = document.createElement('table')
            const thead = document.createElement('thead')
            const headRow = document.createElement('tr')
            ;['Ngày', 'Loại', 'Mô tả', 'Số tiền', 'Số dư'].forEach(label => {
                const th = document.createElement('th')
                th.textContent = label
                headRow.appendChild(th)
            })
            thead.appendChild(headRow)

            const tbody = document.createElement('tbody')
            let running_balance = 0
            entries.forEach(entry => {
                running_balance += entry.sign * entry.amount

                const d = new Date(entry.date)
                const dd = String(d.getDate()).padStart(2, '0')
                const mm = String(d.getMonth() + 1).padStart(2, '0')
                const yy = String(d.getFullYear()).slice(-2)

                const row = document.createElement('tr')

                const dateTd = document.createElement('td')
                dateTd.textContent = `${dd}/${mm}/${yy}`
                row.appendChild(dateTd)

                const typeTd = document.createElement('td')
                const badge = document.createElement('span')
                badge.textContent = badgeLabel[entry.type] || entry.type
                badge.style.cssText = badgeStyle[entry.type] || ''
                typeTd.appendChild(badge)
                row.appendChild(typeTd)

                const labelTd = document.createElement('td')
                labelTd.textContent = entry.label
                row.appendChild(labelTd)

                const amountTd = document.createElement('td')
                amountTd.textContent = (entry.sign === 1 ? '+' : '-') + formatMoney(entry.amount)
                amountTd.style.color = entry.sign === 1 ? 'var(--danger)' : 'var(--success)'
                amountTd.style.fontWeight = 'bold'
                row.appendChild(amountTd)

                const balanceTd = document.createElement('td')
                balanceTd.textContent = formatMoney(running_balance)
                balanceTd.style.color = running_balance > 0 ? 'var(--danger)' : 'var(--success)'
                balanceTd.style.fontWeight = 'bold'
                row.appendChild(balanceTd)

                tbody.appendChild(row)
            })

            const final_balance = running_balance
            const summaryRow = document.createElement('tr')
            ;['Tổng đang giữ', '—', '—', '—', formatMoney(final_balance)].forEach((val, idx) => {
                const td = document.createElement('td')
                td.textContent = val
                td.style.fontWeight = 'bold'
                td.style.borderTop = '3px solid var(--border)'
                td.style.paddingTop = '12px'
                if (idx === 0) td.style.fontSize = '15px'
                if (idx === 4) td.style.color = final_balance > 0 ? 'var(--danger)' : 'var(--success)'
                summaryRow.appendChild(td)
            })
            tbody.appendChild(summaryRow)

            table.append(thead, tbody)
            body.appendChild(table)
        }

        function closeBalanceModal() {
            document.getElementById('balance-modal').style.display = 'none'
            document.body.classList.remove('modal-open')
        }

        async function openTripsModal(driverId, driverName, driverEmail, driverSdt, driverBienSo) {
            document.getElementById('trips-modal-title').textContent = 'Chi tiết: ' + driverName
            const body = document.getElementById('trips-modal-body')
            body.textContent = ''

            const infoDiv = document.createElement('div')
            infoDiv.style.cssText = 'background:var(--bg);padding:12px 14px;border-radius:var(--radius-sm);margin-bottom:16px;font-size:14px;line-height:1.8'

            const emailRow = document.createElement('div')
            emailRow.innerHTML = '<strong>📧 Email:</strong> '
            emailRow.appendChild(document.createTextNode(driverEmail || '-'))
            infoDiv.appendChild(emailRow)

            const sdtRow = document.createElement('div')
            sdtRow.innerHTML = '<strong>📱 SĐT:</strong> '
            sdtRow.appendChild(document.createTextNode(driverSdt || '-'))
            infoDiv.appendChild(sdtRow)

            const xeRow = document.createElement('div')
            xeRow.innerHTML = '<strong>🚛 Xe đang chạy:</strong> '
            xeRow.appendChild(document.createTextNode(driverBienSo ? formatBienSo(driverBienSo) : '(chưa được gán xe)'))
            infoDiv.appendChild(xeRow)

            body.appendChild(infoDiv)

            const filterDiv = document.createElement('div')
            filterDiv.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:12px'
            const filterLabel = document.createElement('label')
            filterLabel.textContent = 'Tháng:'
            filterLabel.style.fontWeight = '600'
            const filterInput = document.createElement('input')
            filterInput.type = 'month'
            filterInput.id = 'trips-modal-filter-month'
            filterInput.style.cssText = 'padding:6px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm)'
            const filterBtn = document.createElement('button')
            filterBtn.className = 'btn btn-sm'
            filterBtn.textContent = 'Lọc'
            filterBtn.addEventListener('click', () => renderTripsList(driverId))
            const clearBtn = document.createElement('button')
            clearBtn.className = 'btn btn-sm btn-gray'
            clearBtn.textContent = 'Tất cả'
            clearBtn.addEventListener('click', () => {
                filterInput.value = ''
                renderTripsList(driverId)
            })
            filterDiv.append(filterLabel, filterInput, filterBtn, clearBtn)
            body.appendChild(filterDiv)

            const tripsContainer = document.createElement('div')
            tripsContainer.id = 'trips-modal-list'
            tripsContainer.textContent = 'Đang tải...'
            body.appendChild(tripsContainer)

            const deleteSection = document.createElement('div')
            deleteSection.style.cssText = 'margin-top:20px;padding-top:16px;border-top:1px solid var(--border);text-align:right'
            const deleteBtn = document.createElement('button')
            deleteBtn.className = 'btn btn-danger btn-sm'
            deleteBtn.textContent = '🗑️ Xóa tài xế'
            deleteBtn.addEventListener('click', async () => {
                const success = await deleteDriver(driverId, driverName)
                if (success) closeTripsModal()
            })
            deleteSection.appendChild(deleteBtn)
            body.appendChild(deleteSection)

            document.getElementById('trips-modal').style.display = 'flex'
            document.body.classList.add('modal-open')

            await renderTripsList(driverId)
        }

        async function renderTripsList(driverId) {
            const container = document.getElementById('trips-modal-list')
            if (!container) return
            container.textContent = 'Đang tải...'

            const monthInput = document.getElementById('trips-modal-filter-month')
            const month = monthInput ? monthInput.value : ''

            let query = sb.from('trips')
                .select('id, ngay_bat_dau, tuyen_duong, doanh_thu, trang_thai')
                .eq('owner_id', ownerProfileId)
                .eq('tai_xe_id', driverId)
                .order('ngay_bat_dau', { ascending: false })

            if (month) {
                const start = month + '-01'
                const end = new Date(month + '-01')
                end.setMonth(end.getMonth() + 1)
                query = query.gte('ngay_bat_dau', start + 'T00:00:00').lt('ngay_bat_dau', end.toISOString().split('T')[0] + 'T00:00:00')
            }

            const { data, error } = await query

            if (error) { container.textContent = 'Lỗi: ' + error.message; return }
            if (!data || data.length === 0) { container.textContent = 'Không có chuyến nào'; return }

            const tripStatusLabels = { dang_chay: '🟢 Đang chạy', hoan_thanh: '✅ Hoàn thành' }

            container.textContent = ''
            const table = document.createElement('table')
            const thead = document.createElement('thead')
            const headRow = document.createElement('tr')
            ;['Ngày', 'Tuyến đường', 'Doanh thu', 'Trạng thái'].forEach(label => {
                const th = document.createElement('th')
                th.textContent = label
                headRow.appendChild(th)
            })
            thead.appendChild(headRow)

            const tbody = document.createElement('tbody')
            data.forEach(t => {
                const row = document.createElement('tr')
                const dateCell = document.createElement('td')
                dateCell.textContent = formatDate(t.ngay_bat_dau)
                row.appendChild(dateCell)

                const routeCell = document.createElement('td')
                routeCell.textContent = t.tuyen_duong || '-'
                row.appendChild(routeCell)

                const revenueCell = document.createElement('td')
                revenueCell.textContent = t.doanh_thu === null || t.doanh_thu === undefined ? '-' : formatMoney(t.doanh_thu)
                revenueCell.style.color = '#e67e22'
                row.appendChild(revenueCell)

                const statusCell = document.createElement('td')
                statusCell.textContent = tripStatusLabels[t.trang_thai] || t.trang_thai || '-'
                row.appendChild(statusCell)

                tbody.appendChild(row)
            })

            table.append(thead, tbody)
            container.appendChild(table)
        }

        function closeTripsModal() {
            document.getElementById('trips-modal').style.display = 'none'
            document.body.classList.remove('modal-open')
        }

        async function logout() {
            await sb.auth.signOut()
            window.location.href = 'bai10.html'
        }

        function exportExcel() {
            if (typeof XLSX === 'undefined') {
                showToast('Không thể tải thư viện Excel', 'error')
                return
            }

            const rows = [['Họ tên', 'SĐT', 'Xe đang chạy', 'Đang giữ']]

            document.querySelectorAll('#driver-list tr').forEach(tr => {
                const cells = tr.querySelectorAll('td')
                if (cells.length >= 4) {
                    rows.push([
                        cells[0].textContent,
                        cells[1].textContent,
                        cells[2].textContent,
                        cells[3].textContent
                    ])
                }
            })

            const ws = XLSX.utils.aoa_to_sheet(rows)
            const wb = XLSX.utils.book_new()
            XLSX.utils.book_append_sheet(wb, ws, 'Danh sách tài xế')
            XLSX.writeFile(wb, `danh-sach-tai-xe.xlsx`)
        }

        const VAPID_PUBLIC_KEY = 'BJO2an5FL6G-ROpD5_krG8QteQJW2aiTNR-GDEhAh4mMC1rX10gDmMDjaXpUcHTsgAQpzZNVdVUdpwE2XvVr070'

        function urlBase64ToUint8Array(b64) {
            const padding = '='.repeat((4 - b64.length % 4) % 4)
            const base64 = (b64 + padding).replace(/-/g, '+').replace(/_/g, '/')
            const raw = atob(base64)
            return Uint8Array.from([...raw].map(c => c.charCodeAt(0)))
        }

        async function setupPushNotifications(userId) {
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) return
            try {
                const permission = await Notification.requestPermission()
                if (permission !== 'granted') return
                const reg = await navigator.serviceWorker.ready
                const vapidKey = urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
                const existing = await reg.pushManager.getSubscription()
                const sub = existing || await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: vapidKey
                })
                await fetch('/api/subscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, subscription: sub.toJSON() })
                })
            } catch (e) {
                console.error('Push setup error:', e)
            }
        }

        async function loadNotifySettings() {
            const { data } = await sb
                .from('notify_settings')
                .select('notify_new_trip, notify_complete, notify_expense, notify_maintenance')
                .eq('user_id', ownerProfileId)
                .maybeSingle()
            document.getElementById('notif-new-trip').checked    = data ? data.notify_new_trip    : true
            document.getElementById('notif-complete').checked     = data ? data.notify_complete     : true
            document.getElementById('notif-expense').checked      = data ? data.notify_expense      : true
            document.getElementById('notif-maintenance').checked  = data ? data.notify_maintenance  : true
        }

        async function saveNotifySetting(key, value) {
            console.log('saveNotifySetting', key, value, ownerProfileId)
            await sb.from('notify_settings')
                .upsert({ user_id: ownerProfileId, [key]: value }, { onConflict: 'user_id' })
        }

        function toggleNotifyPanel() {
            const p = document.getElementById('notify-panel')
            p.style.display = p.style.display === 'none' ? 'block' : 'none'
        }

        async function initPage() {
            setDriverMessage('Đang tải ...')
            const auth = await requireRole(sb, 'owner')
            if (!auth) return
            ownerProfileId = auth.profile.id
            loadNotifySettings()
            setupPushNotifications(ownerProfileId)
            loadDrivers()
        }

        setupLogoutListener(sb)
        initPage()
        ;(function() {
            const btn = document.getElementById('hamburger-btn')
            const menu = document.getElementById('hamburger-menu')
            btn.addEventListener('click', e => { e.stopPropagation(); menu.classList.toggle('show') })
            document.addEventListener('click', e => {
                if (!e.target.closest('#hamburger-menu') && !e.target.closest('#hamburger-btn'))
                    menu.classList.remove('show')
            })
            document.getElementById('menu-logout').addEventListener('click', logout)
            document.getElementById('menu-excel').addEventListener('click', exportExcel)
        })()
        document.addEventListener('click', e => {
            if (!e.target.closest('#notify-panel') && !e.target.closest('button[onclick="toggleNotifyPanel()"]'))
                document.getElementById('notify-panel').style.display = 'none'
        })
    </script>
