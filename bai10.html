<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Vận tải</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <style>
        body.login-page {
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }

        .login-wrapper {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px 28px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .login-logo {
            display: block;
            margin: 0 auto 20px;
            max-width: 220px;
            height: auto;
        }

        .login-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .login-tagline {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .btn-google-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #1565c0;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(21,101,192,0.25);
            margin-bottom: 12px;
        }

        .btn-google-login:hover {
            background: #1976d2;
            transform: translateY(-1px);
        }

        .btn-google-login:disabled {
            background: #90a4ae;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-google-login svg {
            background: white;
            border-radius: 50%;
            padding: 2px;
        }

        .btn-sdt-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: white;
            color: var(--primary);
            border: 1.5px solid var(--primary);
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .btn-sdt-login:hover {
            background: #e3f2fd;
            transform: translateY(-1px);
        }

        .login-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .version {
            font-size: 11px;
            color: #aaa;
            letter-spacing: 0.5px;
        }

        .loading-screen {
            display: none;
            position: fixed;
            inset: 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: var(--bg);
        }

        .loading-screen.active {
            display: flex;
        }

        .loading-screen .spinner {
            width: 40px;
            height: 40px;
        }

        .loading-screen p {
            color: #1565c0;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body class="login-page">

    <div class="login-wrapper" id="login-wrapper">
        <img src="logo/logo.PNG" alt="Ea Kar" class="login-logo">
        <h1 class="login-title">AI quản lý vận tải toàn diện</h1>
        <p class="login-tagline">Theo dõi chuyến, lương, chi phí realtime</p>

        <button class="btn-google-login" onclick="loginGoogle()" id="btn-login">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Đăng nhập với Google
        </button>

        <button class="btn-sdt-login" onclick="loginSdt()">
            <img src="logo/zalo.svg" alt="Zalo" style="width:20px;height:20px">
            Đăng nhập bằng mã Zalo OTP
        </button>

        <p class="login-hint">Chủ xe dùng Google &nbsp;•&nbsp; Tài xế dùng Zalo</p>
        <p class="version">v1.0 • EA KAR</p>
    </div>

    <!-- LOADING SCREEN -->
    <div class="loading-screen" id="loading-screen">
        <div class="spinner"></div>
        <p id="loading-text">Đang xác thực...</p>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        const sb = createSb();

        function showToast(msg, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        function showLoading(text = 'Đang xác thực...') {
            document.getElementById('login-wrapper').style.display = 'none';
            document.getElementById('loading-screen').classList.add('active');
            document.getElementById('loading-text').textContent = text;
        }

        function showLogin() {
            document.getElementById('login-wrapper').style.display = 'block';
            document.getElementById('loading-screen').classList.remove('active');
        }

        function loginSdt() {
            window.location.href = 'login-sdt.html';
        }

        async function loginGoogle() {
            document.getElementById('btn-login').disabled = true;
            const {error} = await sb.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/bai10.html' }
            });
            if (error) {
                showToast('Đăng nhập thất bại: ' + error.message, 'error');
                document.getElementById('btn-login').disabled = false;
            }
        }

        async function checkUserRole(user) {
            const {data, error} = await sb
                .from('users')
                .select('role')
                .eq('email', user.email)
                .maybeSingle();

            if (error) {
                throw new Error(error.message);
            }

            if (!data) {
                document.getElementById('login-wrapper').style.display = 'none';
                document.getElementById('loading-screen').classList.remove('active');
                const errCard = document.createElement('div');
                errCard.style.cssText = 'max-width:400px;margin:80px auto;padding:40px 28px;background:white;border-radius:var(--radius);box-shadow:var(--shadow);text-align:center';
                const icon = document.createElement('div');
                icon.style.cssText = 'font-size:48px;margin-bottom:16px';
                icon.textContent = '🚫';
                const msg = document.createElement('p');
                msg.style.cssText = 'font-size:1.05em;color:var(--text);margin-bottom:24px;line-height:1.5';
                msg.textContent = 'Tài khoản chưa được cấp quyền. Vui lòng liên hệ chủ xe.';
                const btnOut = document.createElement('button');
                btnOut.className = 'btn btn-danger';
                btnOut.textContent = 'Thử lại bằng tài khoản khác';
                btnOut.onclick = async () => { await sb.auth.signOut(); window.location.href = 'bai10.html'; };
                errCard.append(icon, msg, btnOut);
                document.body.appendChild(errCard);
                return;
            }
            return data.role;
        }

        async function redirectByRole(user) {
            try {
                const role = await checkUserRole(user);
                if (!role) return;
                showLoading((role === 'owner' || role === 'supervisor') ? 'Đang vào dashboard...' : 'Đang vào trang tài xế...');
                setTimeout(() => {
                    window.location.href = (role === 'owner' || role === 'supervisor') ? 'owner-dashboard.html' : 'driver-page.html';
                }, 600);
            } catch (err) {
                console.error('Role check error:', err);
                showLogin();
                showToast('Không thể xác thực quyền truy cập. Vui lòng thử lại.', 'error');
            }
        }

        async function checkUser() {
            showLoading();
            const {data, error} = await sb.auth.getSession();
            if (error) {
                showLogin();
                showToast('Không thể xác thực phiên đăng nhập.', 'error');
                return;
            }
            const session = data?.session;
            if (session) {
                await redirectByRole(session.user);
                return;
            } else {
                showLogin();
            }

            sb.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN' && session) {
                    await redirectByRole(session.user);
                } else if (event === 'SIGNED_OUT') {
                    showLogin();
                }
            });
        }

        checkUser();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('SW registered'))
                .catch(err => console.log('SW error:', err));
        }
    </script>
</body>
</html>
